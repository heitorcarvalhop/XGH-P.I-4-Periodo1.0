server.port=0

spring.datasource.url=jdbc:postgresql://${TEST_DB_HOST:localhost}:${TEST_DB_PORT:5432}/${TEST_DB_NAME:barbershop_db}
spring.datasource.username=${TEST_DB_USER:postgres}
spring.datasource.password=${TEST_DB_PASSWORD:123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

jwt.secret=${TEST_JWT_SECRET:SuaChaveSecretaSuperLongaEComplexaParaAssinarTokensJWT}
